name: Build Test Image

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/build-test-image.yml'
      - 'dockertests/Dockerfile.test'
      - 'dockertests/base-requirements.txt'
      - 'dockertests/tests/**/requirements.txt'
  pull_request:
    paths:
      - '.github/workflows/build-test-image.yml'
      - 'dockertests/Dockerfile.test'
      - 'dockertests/base-requirements.txt'
      - 'dockertests/tests/**/requirements.txt'
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute Docker image tag
        id: image
        run: |
          set -euo pipefail
          repo="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_name="${REGISTRY}/${repo}/retrace-test-base"
          image_tag="dockerfile-$(sha256sum dockertests/Dockerfile.test | awk '{print $1}')"
          echo "name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "Image: ${image_name}:${image_tag}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockertests/Dockerfile.test
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output image info
        run: |
          echo "Image built and pushed: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}"
          echo "Also tagged: ${{ steps.image.outputs.name }}:latest"
