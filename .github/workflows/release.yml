name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.2.4. The workflow will create v0.2.4."
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  id-token: write
  contents: write

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "Manual PyPI releases must be run from main, got ${GITHUB_REF}" >&2
              exit 1
            fi
            tag="${VERSION_INPUT}"
            if [[ "${tag}" != v* ]]; then
              tag="v${tag}"
            fi

            git fetch --tags origin
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin" >&2
              exit 1
            fi
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v0.2.4, got ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

  fast_test:
    name: Quick Test (Linux)
    needs: prepare_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply manual release tag locally
        if: github.event_name == 'workflow_dispatch'
        run: git tag "${{ needs.prepare_release.outputs.tag }}" "${GITHUB_SHA}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: false

      - name: Install Build & Test Dependencies
        run: pip install meson-python meson ninja pytest setuptools_scm

      - name: Build & Install
        run: pip install . --no-build-isolation

      - name: Run Tests
        run: python -m pytest tests -vv -rs

  build_wheels:
    name: Build on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: [prepare_release, fast_test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        python-version: ["3.11", "3.12"]
        include:
          - python-version: "3.11"
            py-tag: "cp311-*"
          - python-version: "3.12"
            py-tag: "cp312-*"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply manual release tag locally
        if: github.event_name == 'workflow_dispatch'
        run: git tag "${{ needs.prepare_release.outputs.tag }}" "${GITHUB_SHA}"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: false

      - name: Install build tools
        run: pip install cibuildwheel==2.21.3 meson-python meson ninja setuptools_scm

      - name: Print version
        run: python -m setuptools_scm

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.py-tag }}
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_i686"
          CIBW_ENVIRONMENT: >-
            MESONPY_EDITABLE_VERBOSE=1
            GOTOOLCHAIN=local
          CIBW_ENVIRONMENT_LINUX: >-
            MESONPY_EDITABLE_VERBOSE=1
            GOTOOLCHAIN=local
            PATH="/usr/local/go/bin:$PATH"
          CIBW_ENVIRONMENT_MACOS: >-
            MESONPY_EDITABLE_VERBOSE=1
            GOTOOLCHAIN=local
            MACOSX_DEPLOYMENT_TARGET=12.0
          CIBW_BEFORE_ALL_LINUX: >
            bash -eux -c '
              go_version=1.25.7
              machine="$(uname -m)"
              bits="$(getconf LONG_BIT || true)"
              case "${machine}:${bits}" in
                x86_64:32|i386:*|i686:*) go_arch=386 ;;
                x86_64:*) go_arch=amd64 ;;
                aarch64:*|arm64:*) go_arch=arm64 ;;
                *) echo "Unsupported Go bootstrap architecture: ${machine}" >&2; exit 1 ;;
              esac
              url="https://go.dev/dl/go${go_version}.linux-${go_arch}.tar.gz"
              if command -v curl >/dev/null 2>&1; then
                curl -fsSL "${url}" -o /tmp/go.tgz
              else
                python -c "import sys, urllib.request; urllib.request.urlretrieve(sys.argv[1], '/tmp/go.tgz')" "${url}"
              fi
              rm -rf /usr/local/go
              tar -C /usr/local -xzf /tmp/go.tgz
              /usr/local/go/bin/go version
            '
          CIBW_BEFORE_BUILD: pip install meson-python meson ninja
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: RETRACE_TEST_INSTALLED_WHEEL=1 PYTHONPATH={project} pytest {project}/tests

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: retracesoftware-${{ matrix.os }}-${{ matrix.python-version }}-wheels
          path: wheelhouse/*.whl

  publish_release:
    name: Create GitHub Release
    needs: [prepare_release, build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - name: Push release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare_release.outputs.tag }}"

          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${tag}"

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*-wheels"
          merge-multiple: true

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          name: Release ${{ needs.prepare_release.outputs.tag }}
          files: dist/*.whl
          make_latest: "true"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_pypi:
    name: Publish to PyPI
    needs: [prepare_release, publish_release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*-wheels"
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
