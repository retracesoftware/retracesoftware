name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  id-token: write
  contents: write

jobs:
  fast_test:
    name: Quick Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Build & Test Dependencies
        run: pip install meson-python meson ninja pytest setuptools_scm

      - name: Build & Install
        run: pip install . --no-build-isolation

      - name: Run Tests
        run: python -m pytest tests -vv -rs

  build_wheels:
    name: Build on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: fast_test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        python-version: ["3.11", "3.12"]
        include:
          - python-version: "3.11"
            py-tag: "cp311-*"
          - python-version: "3.12"
            py-tag: "cp312-*"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: pip install cibuildwheel==2.21.3 meson-python meson ninja setuptools_scm

      - name: Print version
        run: python -m setuptools_scm

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.py-tag }}
          CIBW_ENVIRONMENT: >-
            MESONPY_EDITABLE_VERBOSE=1
          CIBW_BEFORE_BUILD: pip install meson-python meson ninja
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: retracesoftware-${{ matrix.os }}-${{ matrix.python-version }}-wheels
          path: wheelhouse/*.whl

  publish_release:
    name: Create GitHub Release
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*-wheels"
          merge-multiple: true

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*.whl
          make_latest: "true"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_pypi:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*-wheels"
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
