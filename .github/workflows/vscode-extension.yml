name: VS Code Extension

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Build only, publish the current version, or publish after bumping the extension version"
        required: true
        default: "package-only"
        type: choice
        options:
          - package-only
          - publish-current
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: vscode-extension-publish
  cancel-in-progress: false

env:
  VSCE_VERSION: "3.6.0"

jobs:
  package:
    name: Package and publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure release git identity
        if: ${{ inputs.release == 'patch' || inputs.release == 'minor' || inputs.release == 'major' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump extension version
        if: ${{ inputs.release == 'patch' || inputs.release == 'minor' || inputs.release == 'major' }}
        run: |
          npm version "${{ inputs.release }}" --no-git-tag-version

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: |
          version="$(node -p "require('./package.json').version")"
          mkdir -p ../dist/vscode
          npx --yes "@vscode/vsce@${VSCE_VERSION}" package --out "../dist/vscode/retrace-debug-extension-${version}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrace-vscode-extension
          path: dist/vscode/*.vsix

      - name: Check Marketplace token
        if: ${{ inputs.release != 'package-only' }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::error::Missing VSCE_PAT. Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Push release commit and tag
        if: ${{ inputs.release == 'patch' || inputs.release == 'minor' || inputs.release == 'major' }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="vscode-v${version}"
          git add package.json package-lock.json
          git commit -m "chore(vscode): release ${tag} [skip ci]"
          git tag "${tag}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${tag}"

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.release != 'package-only' }}
        run: |
          version="$(node -p "require('./package.json').version")"
          npx --yes "@vscode/vsce@${VSCE_VERSION}" publish --packagePath "../dist/vscode/retrace-debug-extension-${version}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
