name: Docker Scenario Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  dockertests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare Docker test image
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_name="ghcr.io/${repo}/retrace-test-base"
          image_tag="dockerfile-$(sha256sum dockertests/Dockerfile.test | awk '{print $1}')"
          remote_image="${image_name}:${image_tag}"

          echo "Using Docker test image tag: ${remote_image}"

          if [ -n "${GHCR_TOKEN:-}" ] && echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin >/dev/null 2>&1; then
            echo "Logged in to GHCR"
          else
            echo "GHCR login failed; will build locally if pull fails"
          fi

          if docker pull "${remote_image}"; then
            docker tag "${remote_image}" retracesoftware-test
          else
            echo "GHCR image unavailable; building Docker test image locally"
            docker build -t retracesoftware-test -f dockertests/Dockerfile.test .
          fi

      - name: Run Docker scenario tests
        working-directory: dockertests
        run: python run.py --clean --smoke --image retracesoftware-test
