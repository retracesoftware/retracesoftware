name: Docker Scenario Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockertests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Docker test image
        run: docker build -t retracesoftware-test -f dockertests/Dockerfile.test .

      - name: Run Docker scenario tests
        working-directory: dockertests
        run: python run.py --clean --image retracesoftware-test
