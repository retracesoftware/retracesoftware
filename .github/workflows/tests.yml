name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test tags to include (comma-separated, empty for all)'
        required: false
        default: ''
      exclude_tags:
        description: 'Test tags to exclude (comma-separated)'
        required: false
        default: 'docker'

permissions:
  contents: read

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build dependencies
        run: pip install meson-python meson ninja setuptools_scm pytest

      - name: Build and install
        run: pip install -e . --no-build-isolation

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run Go tests
        working-directory: go
        run: go test ./...

  docker-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build dependencies
        run: pip install meson-python meson ninja setuptools_scm

      - name: Build and install
        run: pip install -e . --no-build-isolation

      - name: Run Docker tests
        working-directory: dockertests
        run: python run_all.py -t docker --verbose
