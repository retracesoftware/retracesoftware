# Core file I/O entrypoints.
#
# `_io` C types are owned heavily by the interpreter itself. Default coverage
# keeps path-backed IO passthrough and retraces only fd-style open calls through
# the install-layer fd-only path predicate. Broader `_io` type proxying remains
# available through explicit user module overrides.

proxy = ["open", "open_code"]

immutable = ["BlockingIOError", "UnsupportedOperation"]

# Default install gives `_io` an fd-only predicate: all path-like arguments
# bypass retrace, while integer file descriptors still enter the boundary.
[pathparam]
open = "file"
open_code = "path"
