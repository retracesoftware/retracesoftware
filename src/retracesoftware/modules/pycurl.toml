# pycurl C extension — HTTP I/O via libcurl.
# All HTTP I/O (DNS, TLS, sockets) happens in C.
# None of this flows through Python's _socket or _ssl.
#
# Curl — wraps CURL*, performs individual HTTP requests.
# CurlMulti — wraps CURLM*, manages concurrent transfers.
# CurlShare — wraps CURLSH*, shared state between handles.

package = "pycurl"

proxy = ["Curl", "CurlMulti", "CurlShare"]

immutable = ["error"]
