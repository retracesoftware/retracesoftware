# mysqlclient C extension — MySQL I/O via libmysqlclient.
# All socket I/O happens in C (mysql_real_connect, mysql_real_query, mysql_store_result).
# None of this flows through Python's _socket or _ssl.
#
# connection — wraps MYSQL*, performs queries, transactions, all network I/O.
# result — wraps MYSQL_RES*, fetches rows from the server.

package = "mysqlclient"

proxy = ["connect", "connection", "result"]

immutable = ["MySQLError", "Warning", "Error", "InterfaceError",
             "DatabaseError", "DataError", "OperationalError",
             "IntegrityError", "InternalError", "ProgrammingError",
             "NotSupportedError"]
