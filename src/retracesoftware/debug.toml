# Debug preset -- verbose output, smaller buffers, faster flushes.
# Useful for diagnosing retrace itself or inspecting traces in real time.

[writer]
# Smaller inflight budget so backpressure kicks in sooner, making
# buffer-related issues easier to reproduce.
inflight_limit = "16MB"

# Smaller queues surface full-queue conditions earlier.
queue_capacity = 4096

# How long the consumer thread sleeps between wakeups when traffic is light.
consumer_wait_timeout_ms = "10ms"

# Aggressive flush interval so trace data hits disk almost immediately,
# useful when tailing the output or debugging crashes.
flush_interval = "10ms"

[record]
recording = "{script}.retrace"

# Verbose diagnostics enabled by default.
verbose = true

# Always capture stack traces in debug mode.
stacktraces = true

trace_shutdown = false
trace_inputs = false

# Trigger gc.collect at intercepted safe points when GC pressure is due.
# 0 disables this entirely. Larger values make collection more eager,
# because the underlying predicate checks count * multiplier > threshold.
# This is useful for making weakref/finalizer timing more reproducible
# during debugging without depending on ambient GC timing.
gc_collect_multiplier = 0

# Terminate on serialization errors instead of silently dropping them.
quit_on_error = true
