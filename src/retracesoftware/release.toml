# Release preset -- optimized for low overhead in production recordings.

[writer]
# Maximum bytes queued between the producer (ObjectWriter) and the
# background persister thread.  When exceeded the producer yields until
# the persister catches up, providing backpressure.
inflight_limit = "128MB"

# Capacity of the lock-free SPSC queue carrying serialized entries from
# the producer to the persister thread.  Larger values absorb bursts but
# use more memory.
queue_capacity = 65536

# How long the consumer thread may sleep before it polls again when the
# queue is below the notify threshold.
consumer_wait_timeout_ms = "10ms"

# How often a background thread calls flush() on the writer, ensuring
# buffered data reaches the file descriptor.
flush_interval = "10ms"

[record]
# Output path for the trace file.  Supports {script} (base name of the
# recorded script without extension) and {pid} placeholders, plus
# strftime format codes.
recording = "{script}.retrace"

# Print diagnostic messages to stderr during recording.
verbose = false

# Capture a Python stack trace with every recorded event.
# Adds significant overhead -- use for debugging only.
stacktraces = false

# Continue recording during interpreter shutdown and cleanup hooks.
trace_shutdown = false

# Record call arguments for every proxied call (large traces).
trace_inputs = false

# Trigger gc.collect at intercepted safe points when GC pressure is due.
# 0 disables this entirely. Larger values make collection more eager,
# because the underlying predicate checks count * multiplier > threshold.
# Safe-point-driven GC reduces the chance of weakref/finalizer timing
# diverging from replay, while leaving the interpreter's normal GC as a
# fallback.
gc_collect_multiplier = 0

# Silently drop serialization errors to avoid crashing the application.
quit_on_error = false
