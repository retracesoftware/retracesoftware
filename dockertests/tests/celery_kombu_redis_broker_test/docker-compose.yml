services:
  redis:
    image: redis:7-alpine
    ports:
      - "16380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      retries: 30

  dryrun:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_BROKER_URL: redis://redis:6379/9

  record:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_BROKER_URL: redis://redis:6379/9
