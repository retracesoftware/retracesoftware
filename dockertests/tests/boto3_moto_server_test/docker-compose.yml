services:
  moto:
    image: motoserver/moto:5.0.18
    ports:
      - "15000:5000"
    environment:
      MOTO_PORT: "5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/moto-api/')",
        ]
      interval: 2s
      retries: 30

  dryrun:
    depends_on:
      moto:
        condition: service_healthy
    environment:
      AWS_ENDPOINT_URL: http://moto:5000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

  record:
    depends_on:
      moto:
        condition: service_healthy
    environment:
      AWS_ENDPOINT_URL: http://moto:5000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
