# Flask client-side replay test - extends script base with helper servers.
# Run from dockertests/: ./runtest.sh flask_test

services:
  server-dryrun:
    image: ${TEST_IMAGE:-python:3.11-slim}
    depends_on:
      install:
        condition: service_completed_successfully
    volumes:
      - ${TEST_DIR}:/app/test:ro
      - ${TEST_PACKAGES_DIR:-./.cache/packages}:/app/packages:ro
    environment:
      PYTHONPATH: /app/packages
      PORT: 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 2s
      retries: 10
      start_period: 3s
    command: python /app/test/app.py

  dryrun:
    depends_on:
      install:
        condition: service_completed_successfully
      server-dryrun:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/packages
      FLASK_URL: http://server-dryrun:5000

  server-record:
    image: ${TEST_IMAGE:-python:3.11-slim}
    depends_on:
      dryrun:
        condition: service_completed_successfully
    volumes:
      - ${TEST_DIR}:/app/test:ro
      - ${TEST_PACKAGES_DIR:-./.cache/packages}:/app/packages:ro
    environment:
      PYTHONPATH: /app/packages
      PORT: 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 2s
      retries: 10
      start_period: 3s
    command: python /app/test/app.py

  record:
    depends_on:
      dryrun:
        condition: service_completed_successfully
      server-record:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/packages
      FLASK_URL: http://server-record:5000
