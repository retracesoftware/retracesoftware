# Base docker-compose for SERVER tests
#
# Pattern: test.py is a long-running server, client.py generates load
# Use with: docker compose -f docker-compose.server-base.yml -f tests/xxx/docker-compose.yml run --rm cleanup
#
# Required in test directory:
#   - test.py         : Server code (runs under retrace)
#   - client.py       : Load generator (infrastructure)
#   - requirements.txt: Server dependencies (optional)
#
# Environment variables:
#   - TEST_DIR: Path to test directory (e.g., ./tests/flask_test)
#   - TEST_IMAGE: Base image (default: python:3.12)
#   - SERVER_PORT: Port server listens on (default: 5000)
#   - SERVER_HEALTH_PATH: Health check path (default: /health)

services:
  # Install dependencies
  install:
    image: ${TEST_IMAGE:-python:3.12}
    volumes:
      - ./install.sh:/app/install.sh:ro
      - ./base-requirements.txt:/app/dockertests/base-requirements.txt:ro
      - ..:/app/repo
      - ${TEST_DIR}:/app/test:ro
      - ./.cache/pip:/root/.cache/pip
      - ${TEST_PACKAGES_DIR:-./.cache/packages}:/app/packages
    command: bash /app/install.sh

  # Dryrun - server runs native, client generates load
  server-dryrun:
    image: ${TEST_IMAGE:-python:3.12}
    stop_signal: SIGINT
    stop_grace_period: 15s
    depends_on:
      install:
        condition: service_completed_successfully
    volumes:
      - ${TEST_DIR}:/app/test:ro
      - ${TEST_PACKAGES_DIR:-./.cache/packages}:/app/packages:ro
    environment:
      PYTHONPATH: /app/packages
    command: python /app/test/test.py

  dryrun:
    image: ${TEST_IMAGE:-python:3.12}
    depends_on:
      server-dryrun:
        condition: service_started
    volumes:
      - ${TEST_DIR}/client.py:/app/client.py:ro
    environment:
      SERVER_URL: http://server-dryrun:${SERVER_PORT:-5000}
    command: bash -c "pip install -q requests && python /app/client.py"

  # Record - server under retrace, client generates load
  server-record:
    image: ${TEST_IMAGE:-python:3.12}
    stop_signal: SIGINT
    stop_grace_period: 15s
    depends_on:
      dryrun:
        condition: service_completed_successfully
    volumes:
      - ${TEST_DIR}:/app/test:ro
      - ${TEST_DIR}/recording:/recording:rw
      - ${TEST_PACKAGES_DIR:-./.cache/packages}:/app/packages:ro
    working_dir: /recording
    environment:
      PYTHONPATH: /app/packages
      RETRACE_CONFIG: ${RETRACE_CONFIG:-release}
      RETRACE_FORMAT: ${RETRACE_FORMAT:-binary}
      RETRACE_RECORDING: /recording/test.retrace
      REPLAY_BIN: /app/packages/bin/replay
      RETRACE_REPLAY_BIN: /app/packages/bin/replay
      RETRACE_STACKTRACES: ${RETRACE_STACKTRACES:-0}
      RETRACE_RECORD_MODE: ${RETRACE_RECORD_MODE:-pth}
    command: >
      bash -euc '
        case "$$RETRACE_RECORD_MODE" in
          pth)
            python -m retracesoftware install
            python /app/test/test.py
            ;;
          direct)
            python -m retracesoftware \
              --recording "$$RETRACE_RECORDING" \
              --format "$$RETRACE_FORMAT" \
              --replay_bin "$$REPLAY_BIN" \
              -- /app/test/test.py
            ;;
          *)
            echo "unknown RETRACE_RECORD_MODE=$$RETRACE_RECORD_MODE" >&2
            exit 2
            ;;
        esac
      '

  record:
    image: ${TEST_IMAGE:-python:3.12}
    depends_on:
      server-record:
        condition: service_started
    volumes:
      - ${TEST_DIR}/client.py:/app/client.py:ro
    environment:
      SERVER_URL: http://server-record:${SERVER_PORT:-5000}
    command: bash -c "pip install -q requests && python /app/client.py"

  # Replay - server replays from recording (no client needed)
  replay:
    image: ${TEST_IMAGE:-python:3.12}
    depends_on:
      record:
        condition: service_completed_successfully
    network_mode: none
    volumes:
      - ${TEST_DIR}:/app/test:ro
      - ${TEST_DIR}/recording:/recording:rw
      - ${TEST_PACKAGES_DIR:-./.cache/packages}:/app/packages:ro
    environment:
      PYTHONPATH: /app/packages
      RETRACE_REPLAY_MODE: ${RETRACE_REPLAY_MODE:-pidfile}
      RETRACE_FORMAT: ${RETRACE_FORMAT:-binary}
    command: >
      bash -euc '
        case "$$RETRACE_REPLAY_MODE" in
          pidfile)
            /recording/test.retrace --extract
            ROOT_PID="$$(python -m retracesoftware --recording /recording/test.retrace --list_pids | head -n 1)"
            if [ -z "$$ROOT_PID" ]; then
              echo "no root pid found in /recording/test.retrace" >&2
              exit 1
            fi
            echo "ROOT_PID=$$ROOT_PID"
            /recording/test.d/$$ROOT_PID.bin
            ;;
          recording)
            python -m retracesoftware \
              --recording /recording/test.retrace \
              --format "$$RETRACE_FORMAT"
            ;;
          *)
            echo "unknown RETRACE_REPLAY_MODE=$$RETRACE_REPLAY_MODE" >&2
            exit 2
            ;;
        esac
      '

  # Cleanup
  cleanup:
    image: ${TEST_IMAGE:-python:3.12}
    depends_on:
      replay:
        condition: service_completed_successfully
    volumes:
      - ${TEST_DIR}/recording:/recording:rw
    environment:
      RETRACE_CLEAN_RECORDING: ${RETRACE_CLEAN_RECORDING:-1}
    command: >
      sh -c '
        if [ "$${RETRACE_CLEAN_RECORDING:-1}" = "1" ]; then
          rm -rf /recording/*
          echo "recording artifacts cleaned"
        else
          echo "recording artifacts kept in /recording"
          find /recording -maxdepth 2 -print
        fi
      '

# No named volumes - using local .cache/ directory for packages
